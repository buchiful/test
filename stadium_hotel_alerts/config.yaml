# Philippine Sports Stadium 周辺ホテル・Airbnb 空室監視の設定

search:
  # 宿泊候補期間。いずれかで空室があれば通知対象
  stays:
    - check_in: "2027-03-13"
      check_out: "2027-03-15"
    - check_in: "2027-03-15"
      check_out: "2027-03-17"
  # この範囲内で最大何日連続宿泊できるかを確認し、メールに表示する
  stay_range_start: "2027-03-13"
  stay_range_end: "2027-03-17"
  adults: 2
  currency: "PHP"

location:
  name: "Philippine Sports Stadium"
  # Ciudad de Victoria, Bocaue/Santa Maria, Bulacan
  lat: 14.7960
  lng: 120.9545
  # 検索対象の半径 (km)。車40分をカバーできる範囲を広めに取る
  search_radius_km: 30

filters:
  # 1泊あたりの予算 (PHP)
  min_price_per_night: 1800
  max_price_per_night: 3500
  min_rating: 3.7
  require_air_conditioning: true
  # 車での所要時間 (分)
  max_drive_minutes: 38
  preferred_drive_minutes: 20

travel:
  # OSRM は自由流の所要時間を返すため、渋滞を見込んだ係数を掛ける
  traffic_factor: 1.4
  # OSRM が使えない場合のフォールバック: 直線距離 ÷ 平均時速 (km/h)
  fallback_speed_kmh: 30

email:
  to: "buchiful@gmail.com"
  subject_prefix: "[Stadium Hotel Alert]"
  # 宿泊費に併記する第二通貨
  second_currency: "JPY"
  # 為替レート取得 (frankfurter.app) に失敗した場合のフォールバック (1 PHP = 何 JPY)
  fallback_php_to_jpy: 3.4

providers:
  hotels: true   # SerpAPI Google Hotels (要 SERPAPI_API_KEY)
  airbnb: true   # pyairbnb (非公式 API、キー不要)

state_file: "state.json"
